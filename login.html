<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Iniciar Sesión | Encanto</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@500;600;700;800;900&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --purple: #952e8a;
            --purple-dark: #631f6a;
            --purple-light: #c470bb;
            --teal: #1da597;
            --orange: #f8a025;
            --red: #f75227;
            --cream: #f6e6c9;
            --cream-light: #fdf6ea;
        }

        html, body { height: 100%; width: 100%; }

        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(145deg, #4a0d5e 0%, #7a1e73 35%, #952e8a 60%, #1da597 130%);
            overflow: hidden;
            padding: 1.5rem;
        }

        /* ── BACKGROUND ELEMENTS ── */
        .mesh {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(248,160,37,0.25) 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 90% 80%, rgba(29,165,151,0.3) 0%, transparent 60%),
                radial-gradient(ellipse 50% 50% at 50% 50%, rgba(247,82,39,0.1) 0%, transparent 70%);
            animation: meshShift 12s ease-in-out infinite alternate;
            z-index: 0;
        }
        @keyframes meshShift {
            0%   { opacity: 0.8; transform: scale(1) rotate(0deg); }
            100% { opacity: 1;   transform: scale(1.1) rotate(2deg); }
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: float 8s ease-in-out infinite;
            z-index: 1;
        }
        .orb-1 { width: 400px; height: 400px; background: rgba(248,160,37,0.15); top: -100px; right: -50px; animation-delay: 0s; }
        .orb-2 { width: 350px; height: 350px; background: rgba(29,165,151,0.2); bottom: -100px; left: -50px; animation-delay: -4s; }
        .orb-3 { width: 250px; height: 250px; background: rgba(247,82,39,0.1); top: 50%; left: 10%; animation-delay: -2s; }
        @keyframes float {
            0%, 100% { transform: translateY(0px) scale(1); }
            50%       { transform: translateY(-30px) scale(1.1); }
        }

        /* ── LOGIN CARD ── */
        .login-card {
            width: 100%;
            max-width: 520px;
            background: #F7EADF;
            border-radius: 2.5rem;
            padding: 3.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: cardEntrance 0.8s cubic-bezier(0.22, 1, 0.36, 1);
        }
        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .card-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }
        .card-logo {
            height: 140px;
            width: auto;
            margin-bottom: 2rem;
            filter: drop-shadow(0 4px 12px rgba(149,46,138,0.15));
            transition: transform 0.3s ease;
        }
        .card-logo:hover { transform: scale(1.05); }

        .card-header h1 {
            font-family: 'Manrope', sans-serif;
            font-size: 1.85rem;
            font-weight: 900;
            color: var(--purple-dark);
            letter-spacing: -0.5px;
            margin-bottom: 0.4rem;
        }
        .card-header p {
            font-size: 0.9rem;
            color: #8a7a96;
        }

        /* ── FORM FIELDS ── */
        .field { margin-bottom: 1.4rem; }
        .field label {
            display: block;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            color: var(--purple);
            margin-bottom: 0.5rem;
            padding-left: 0.5rem;
        }
        .input-wrap { position: relative; }
        .input-wrap svg {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px; height: 18px;
            color: #c0a8d0;
            transition: color 0.2s;
            pointer-events: none;
        }
        .input-wrap input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            background: white;
            border: 2px solid rgba(149,46,138,0.08);
            border-radius: 16px;
            font-size: 0.95rem;
            color: var(--purple-dark);
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            outline: none;
            transition: all 0.25s ease;
        }
        .input-wrap input::placeholder { color: #c0a8d0; font-weight: 400; }
        .input-wrap input:focus {
            border-color: var(--purple);
            box-shadow: 0 0 0 4px rgba(149,46,138,0.08);
        }
        .input-wrap input:focus + svg { color: var(--purple); }

        .toggle-pass {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #c0a8d0;
            display: flex;
            align-items: center;
        }
        .toggle-pass:hover { color: var(--purple); }

        .field-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.8rem;
            padding: 0 0.5rem;
        }
        .remember {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: #8a7a96;
            cursor: pointer;
        }
        .remember input {
            width: 18px; height: 18px;
            accent-color: var(--purple);
            cursor: pointer;
        }
        .forgot {
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--teal);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .forgot:hover { color: var(--purple); }

        .btn-submit {
            width: 100%;
            padding: 1.1rem;
            background: linear-gradient(135deg, var(--purple) 0%, #7a1e73 100%);
            color: white;
            border: none;
            border-radius: 18px;
            font-family: 'Manrope', sans-serif;
            font-size: 0.9rem;
            font-weight: 800;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px -5px rgba(149,46,138,0.4);
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px -5px rgba(149,46,138,0.5);
            filter: brightness(1.1);
        }
        .btn-submit:active { transform: translateY(0); }

        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 2rem 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(149,46,138,0.1);
        }
        .divider span {
            font-size: 0.75rem;
            font-weight: 700;
            color: #c0a8d0;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .btn-google {
            width: 100%;
            padding: 1rem;
            background: white;
            border: 2px solid rgba(149,46,138,0.08);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--purple-dark);
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .btn-google:hover {
            border-color: rgba(149,46,138,0.2);
            background: #fafafa;
        }
        .btn-google svg { width: 22px; height: 22px; }

        .form-footer {
            margin-top: 2.5rem;
            text-align: center;
            font-size: 0.85rem;
            color: #8a7a96;
        }
        .form-footer a {
            font-weight: 800;
            color: var(--teal);
            text-decoration: none;
            text-transform: uppercase;
            margin-left: 5px;
        }
        .form-footer a:hover { color: var(--purple); }

        @media (max-width: 480px) {
            .login-card { padding: 2.5rem 1.5rem; border-radius: 2rem; }
            .card-header h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <div class="mesh"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="login-card">
        <div class="card-header">
            <img src="logo.png" alt="Encanto" class="card-logo"/>
            <h1>¡Bienvenido de nuevo!</h1>
            <p>Ingresa tus datos para acceder al sistema.</p>
        </div>

        <form onsubmit="return false;">
            <div class="field">
                <label>Correo Electrónico</label>
                <div class="input-wrap">
                    <input type="email" id="email" placeholder="usuario@encanto.com">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                </div>
            </div>

            <div class="field">
                <label>Contraseña</label>
                <div class="input-wrap">
                    <input type="password" id="password" placeholder="••••••••">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    <button type="button" class="toggle-pass" onclick="togglePassword()">
                        <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>
            </div>

            <div class="field-meta">
                <label class="remember">
                    <input type="checkbox"> Recordarme
                </label>
                <a href="#" class="forgot">¿Olvidaste tu clave?</a>
            </div>

            <button type="submit" class="btn-submit">Entrar al Sistema</button>
        </form>

        <div class="divider"><span>O continúa con</span></div>

        <button class="btn-google">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"/>
            </svg>
            Iniciar sesión con Google
        </button>

        <div class="form-footer">
            ¿No tienes cuenta todavía?
            <a href="#">Regístrate gratis</a>
        </div>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('password');
            const icon  = document.getElementById('eye-icon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
            } else {
                input.type = 'password';
                icon.innerHTML = '<path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/>';
            }
        }
    </script>
</body>
</html>
